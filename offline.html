<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Offline</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#111111">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" href="img/icon-192.png">

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:'Roboto',sans-serif;
    }

    body{
      background:#ffffff;
      color:#111111;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100dvh;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:390px;
      text-align:center;
    }

    img{
      width:90px;
      margin:0 auto 24px;
      display:block;
    }

    h2{
      font-size:28px;
      font-weight:700;
      margin-bottom:12px;
    }

    p{
      color:#666;
      line-height:1.6;
      margin-bottom:32px;
    }

    button{
      width:100%;
      height:52px;

      border:none;
      border-radius:999px;

      background:#111;
      color:#fff;

      font-size:16px;
      font-weight:600;

      cursor:pointer;
    }

    button:active{
      transform:scale(.98);
    }

  </style>

</head>

<body>

  <div class="card">

    <img src="img/icon-192.png" alt="Logo">

    <h2>Anda Sedang Offline</h2>

    <p>
      Koneksi internet tidak tersedia.<br>
      Silakan hubungkan kembali ke internet untuk melanjutkan.
    </p>

    <button onclick="location.reload()">
      Coba Lagi
    </button>

  </div>

  <script src="js/register-sw.js"></script>

</body>
</html>
